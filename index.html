<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Redesign</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            margin: 0;
        }
        .cta {
            background: linear-gradient(90deg, #6a11cb, #2575fc);
            color: white;
            border: none;
            padding: 15px 30px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 20px;
            transition: 0.3s;
            border-radius: 5px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            animation: pulse 2s infinite;
        }
        .cta:hover {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            transform: scale(1.05);
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        /* Add your animations and styles here */
        .floating-element {
            position: relative;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translatey(0); }
            50% { transform: translatey(-20px); }
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Our Redesigned Website</h1>
        <a href="#" class="cta">Get Started</a>
    </header>
    <main>
        <section>
            <h2>Our Services</h2>
            <p>Explore our wide range of services optimized for conversions.</p>
            <div class="floating-element">Floating Element</div>
        </section>
        <!-- Add more sections with animations and effects -->
    </main>
    <footer>
        <p>&copy; 2026 Company Name. All rights reserved.</p>
    </footer>
    <script>
        // Add scroll triggers and staggered reveals using Intersection Observer
        const options = {
            root: null,
            threshold: 0.1
        };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                } else {
                    entry.target.classList.remove('visible');
                }
            });
        }, options);

        document.querySelectorAll('.staggered').forEach(section => {
            observer.observe(section);
        });
    </script>
</body>
</html>
